[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
healthcheckDisabled = true
numReplicas = 1

# "Post deploy: not started" in Railway UI is NORMAL if you did not configure a post-deploy command.
# Watch Deploy Logs for:
#   [entrypoint] Launching SQL Server as mssql user...
#   SQL Server is now ready for client connections
#
# If the container keeps restarting:
# 1. Set MSSQL_MEMORY_LIMIT_MB=512 and RAILWAY_RUN_UID=0
# 2. Delete the volume and recreate at mount path /var/opt/mssql
# 3. Or remove the volume temporarily to test without persistence
# 4. Free tier is 1 GB RAM — SQL Server needs 1-2 min to start; wait before checking logs
